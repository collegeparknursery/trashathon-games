<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Trash-A-Thon Games Leaderboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; }
  .sb-wrap { padding: 1.5rem 1rem 2rem; max-width: 680px; margin: 0 auto; }
  .sb-header { text-align: center; margin-bottom: 1.5rem; }
  .sb-title { font-size: 13px; font-weight: 500; letter-spacing: 0.08em; color: #666; text-transform: uppercase; margin-bottom: 4px; }
  .sb-event { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .sb-updated { font-size: 12px; color: #999; margin-top: 6px; }
  .team-grid { display: flex; flex-direction: column; gap: 10px; }
  .team-card { border-radius: 12px; border: 0.5px solid #e0e0e0; background: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .team-card.rank-1 { border: 1.5px solid #1D9E75; }
  .rank-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .rank-1-badge { background: #E1F5EE; color: #0F6E56; }
  .rank-other-badge { background: #f2f2f2; color: #888; }
  .team-emoji { font-size: 28px; flex-shrink: 0; line-height: 1; }
  .team-info { flex: 1; min-width: 0; }
  .team-name { font-size: 15px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-class { font-size: 12px; color: #888; margin-top: 2px; }
  .points-block { text-align: right; flex-shrink: 0; }
  .points-num { font-size: 28px; font-weight: 500; line-height: 1; }
  .points-label { font-size: 11px; color: #aaa; margin-top: 2px; }
  .leader-tag { font-size: 11px; font-weight: 500; background: #E1F5EE; color: #0F6E56; border-radius: 20px; padding: 2px 8px; margin-left: 8px; white-space: nowrap; }
  .divider { height: 0.5px; background: #e8e8e8; margin: 1.25rem 0; }
  .challenges-section { margin-top: 1rem; }
  .challenges-title { font-size: 12px; font-weight: 500; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .challenge-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #f0f0f0; gap: 12px; }
  .challenge-row:last-child { border-bottom: none; }
  .challenge-name { font-size: 13px; color: #1a1a1a; flex: 1; }
  .challenge-pts { font-size: 12px; font-weight: 500; color: #0F6E56; white-space: nowrap; }
  .won-by { font-size: 11px; background: #f2f2f2; color: #888; border-radius: 8px; padding: 2px 8px; white-space: nowrap; }
  .won-by.available { color: #bbb; font-style: italic; }
  .won-by.open { background: #E1F5EE; color: #0F6E56; }
  .edit-note { margin-top: 1.5rem; font-size: 12px; color: #bbb; text-align: center; line-height: 1.6; }
  .edit-note code { font-family: monospace; font-size: 11px; background: #f2f2f2; padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<div class="sb-wrap">
  <div class="sb-header">
    <div class="sb-title">2026 Trash-A-Thon Games</div>
    <div class="sb-event">Leaderboard</div>
    <div class="sb-updated" id="updated-date"></div>
  </div>

  <div class="team-grid" id="team-grid"></div>

  <div class="divider"></div>

  <div class="challenges-section">
    <div class="challenges-title">Challenges</div>
    <div id="challenges-list"></div>
  </div>

  <div class="edit-note">To update: edit the <code>SCORES</code> and <code>CHALLENGES</code> sections at the top of this file.</div>
</div>

<script>

/* ============================================================
   EDIT THESE TWO SECTIONS TO UPDATE THE SCOREBOARD
   ============================================================ */

const UPDATED = "March 20, 2026"; // Update this date each time you save

// Scores in order: Tiny But Mighty Twos, Terrific Cleanup Turtles, K-Pop Trash Hunters, Super Planet Team
const SCORES = [0, 0, 0, 0];

// For each challenge, set winner to:
//   null        = still up for grabs
//   "all"       = all teams earned it (open bonus)
//   "Team Name" = the name of the winning team
const CHALLENGES = [
  { name: "First class: 100% registered on Givebutter", pts: "1 pt", winner: null },
  { name: "Quick-start bonus: class raises $375 by Mar 20", pts: "1 pt each", winner: "all" },
  { name: "First class: hits class fundraising target", pts: "1 pt", winner: null },
  { name: "First class in lead when school hits midpoint goal", pts: "1 pt", winner: null },
  { name: "First class to push school over fundraising goal", pts: "2 pts", winner: null },
  { name: "Game day: best team spirit (guest judge)", pts: "1 pt", winner: null },
  { name: "Game day: adult relay race participation bonus", pts: "1 pt", winner: null },
];

/* ============================================================
   DON'T EDIT BELOW THIS LINE
   ============================================================ */

const TEAMS = [
  { name: "Tiny But Mighty Twos",     cls: "2s",        emoji: "🦄", color: "#E8A317" },
  { name: "Terrific Cleanup Turtles", cls: "3s",        emoji: "🐢", color: "#D4695A" },
  { name: "K-Pop Trash Hunters",      cls: "3/4s",      emoji: "🎤", color: "#5AABCD" },
  { name: "Super Planet Team",        cls: "4s / Pre-K", emoji: "🌍", color: "#52B788" },
];

document.getElementById("updated-date").textContent = "Last updated: " + UPDATED;

const ranked = TEAMS.map((t, i) => ({ ...t, pts: SCORES[i], idx: i }))
  .sort((a, b) => b.pts - a.pts || a.idx - b.idx)
  .map((t, rank) => ({ ...t, rank: rank + 1 }));

const grid = document.getElementById("team-grid");
ranked.forEach(t => {
  const card = document.createElement("div");
  card.className = "team-card" + (t.rank === 1 && t.pts > 0 ? " rank-1" : "");
  card.innerHTML = `
    <div class="rank-badge ${t.rank === 1 && t.pts > 0 ? 'rank-1-badge' : 'rank-other-badge'}">${t.rank}</div>
    <div class="team-emoji">${t.emoji}</div>
    <div class="team-info">
      <div class="team-name">${t.name}${t.rank === 1 && t.pts > 0 ? '<span class="leader-tag">Leading</span>' : ''}</div>
      <div class="team-class">${t.cls}</div>
    </div>
    <div class="points-block">
      <div class="points-num" style="color:${t.color}">${t.pts}</div>
      <div class="points-label">${t.pts === 1 ? "point" : "points"}</div>
    </div>
  `;
  grid.appendChild(card);
});

const challengesList = document.getElementById("challenges-list");
CHALLENGES.forEach(c => {
  const row = document.createElement("div");
  row.className = "challenge-row";
  let wonHtml;
  if (c.winner === "all") {
    wonHtml = `<span class="won-by open">open to all</span>`;
  } else if (c.winner) {
    wonHtml = `<span class="won-by">${c.winner}</span>`;
  } else {
    wonHtml = `<span class="won-by available">up for grabs</span>`;
  }
  row.innerHTML = `
    <div class="challenge-name">${c.name}</div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span class="challenge-pts">${c.pts}</span>
      ${wonHtml}
    </div>
  `;
  challengesList.appendChild(row);
});
</script>
</body>
</html>
